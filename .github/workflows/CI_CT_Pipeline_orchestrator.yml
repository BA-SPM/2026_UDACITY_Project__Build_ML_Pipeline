# CI/CT/DR Orchestrator
#
# How this workflow is controlled:
# 1) push
#    - Stage execution is controlled by PUSH_* gates in `env` below.
# 2) workflow_dispatch (manual run)
#    - Stage execution is controlled by `mode` (ci / ci_ct / full).
#
# Flow order:
# CI -> CT -> Deployment Readiness
# Each stage only runs when the previous stage succeeded.
name: ORCHESTRATOR 00 - CI/CT/DR Pipeline

# Push gates (set to "true" to enable stage on push)
# - PUSH_CI_ENABLED: allow CI stage on push
# - PUSH_CT_ENABLED: allow CT stage on push (after CI)
# - PUSH_DR_ENABLED: allow Deployment Readiness on push (after CT)
env:
  PUSH_CI_ENABLED: "true"
  PUSH_CT_ENABLED: "true"
  PUSH_DR_ENABLED: "false"

on:
  push:
    branches: ["**"]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: ci_ct
        type: choice
        options:
          - ci
          - ci_ct
          - full

jobs:
  # CI layer
  # Runs when:
  # - push and PUSH_CI_ENABLED == true
  # - OR manual workflow_dispatch
  ci_layer:
    if: >-
      ${{
        (
          github.event_name == 'push'
          && env.PUSH_CI_ENABLED == 'true'
        )
        ||
        github.event_name == 'workflow_dispatch'
      }}
    uses: ./.github/workflows/_ORCHESTRATOR_01_ci.yml
    with:
      runner_os: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
      lint_enabled:       true
      typecheck_enabled:  true
      smoke_test_enabled: true
      unit_test_enabled:  true

  # CT layer
  # Runs only if CI succeeded.
  # Then:
  # - on push: only when PUSH_CT_ENABLED == true
  # - on manual run: mode must be ci_ct or full
  ct_layer:
    needs: ci_layer
    if: >-
      ${{
        needs.ci_layer.result == 'success'
        &&
        (
          (
            github.event_name == 'push'
            && env.PUSH_CT_ENABLED == 'true'
          )
          ||
          (
            github.event_name == 'workflow_dispatch'
            && contains(fromJSON('["ci_ct","full"]'), github.event.inputs.mode)
          )
        )
      }}
    uses: ./.github/workflows/_ORCHESTRATOR_02_ct.yml
    with:
      ct_integration_test_enabled: true

  # Deployment Readiness layer
  # Runs only if CT succeeded.
  # Then:
  # - on push: only when PUSH_DR_ENABLED == true
  # - on manual run: mode must be full
  #
  # os_matrix behavior:
  # - uses repository variable OS_MATRIX_JSON when provided
  # - otherwise falls back to ["windows-latest", "ubuntu-latest"]
  deployment_readiness_layer:
    needs: ct_layer
    if: >-
      ${{
        needs.ct_layer.result == 'success'
        &&
        (
          (
            github.event_name == 'push'
            && env.PUSH_DR_ENABLED == 'true'
          )
          ||
          (
            github.event_name == 'workflow_dispatch'
            && github.event.inputs.mode == 'full'
          )
        )
      }}
    uses: ./.github/workflows/_ORCHESTRATOR_03_deployment_readiness.yml
    with:
      os_matrix: ${{ vars.OS_MATRIX_JSON || '["windows-latest", "ubuntu-latest"]' }}
      deployment_test_enabled:  true
      e2e_test_enabled:         false
      security_enabled:         false
      docker_enabled:           false
