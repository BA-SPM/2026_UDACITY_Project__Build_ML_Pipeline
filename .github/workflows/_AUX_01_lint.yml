# ──────────────────────────────────────────────────────────────────
# Reusable Workflow: Lint
# Tool:    flake8
# Checks:  code style, complexity, hard syntax errors
# Config:  .flake8 in project root
# ──────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  lint:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 main.py src components
