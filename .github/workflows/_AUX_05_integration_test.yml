# ──────────────────────────────────────────────────────────────────
# AUX Workflow: Integration Test (internal)
# Tool:    pytest
# Checks:  offline pipeline integration with mock files and mocked external services
#          to validate component wiring without W&B.
# ──────────────────────────────────────────────────────────────────
name: AUX 05 - Integration Test (Offline Pipeline)

on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  integration_test:
    name: Offline Pipeline Integration
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies (offline only)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock hydra-core pandas scipy mlflow wandb

      - name: Run offline pipeline integration tests
        run: pytest tests_offline/integration -q

