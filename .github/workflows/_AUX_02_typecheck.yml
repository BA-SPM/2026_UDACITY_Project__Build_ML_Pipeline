# ──────────────────────────────────────────────────────────────────
# Reusable Workflow: Type Check
# Tool:    mypy
# Checks:  static type annotations
# Scope:   full project code paths
# ──────────────────────────────────────────────────────────────────
name: AUX 02 - Type Check

on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  typecheck:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy pandas-stubs

      - name: Run mypy
        # --ignore-missing-imports: skip errors for packages without type stubs
        run: mypy --explicit-package-bases main.py src components tests_offline --ignore-missing-imports
