# ──────────────────────────────────────────────────────────────────
# Reusable Workflow: Type Check
# Tool:    mypy
# Checks:  static type annotations
# Scope:   src/data_check only (stable code; train step has placeholders)
# ──────────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  typecheck:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mypy
        run: |
          python -m pip install --upgrade pip
          pip install mypy pandas-stubs

      - name: Run mypy
        # --ignore-missing-imports: skip errors for packages without type stubs
        run: mypy src/data_check --ignore-missing-imports
