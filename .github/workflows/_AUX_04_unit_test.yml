# ──────────────────────────────────────────────────────────────────
# AUX Workflow: Unit Test
# Tool:    pytest + pytest-cov
# Checks:  isolated unit tests pass, coverage report generated
# Rule:    NO W&B allowed — all data must be mocked in pytest.
#          W&B is first used in _AUX_06_deployment_test.yml (Deployment layer).
# ──────────────────────────────────────────────────────────────────
name: AUX 04 - Unit Test

on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  unit_test:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pandas scipy pytest-mock

      - name: Run pytest with coverage
        # No WANDB_API_KEY — tests must use mocked/local data only.
        run: pytest src/data_check -m "not wandb" --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
