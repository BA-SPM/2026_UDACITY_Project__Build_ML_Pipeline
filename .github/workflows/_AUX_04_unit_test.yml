# ──────────────────────────────────────────────────────────────────
# AUX Workflow: Unit Test
# Tool:    pytest + pytest-cov
# Checks:  isolated unit tests pass, coverage report generated
# Rule:    NO W&B allowed — tests run fully offline via src/data_check/tests_offline/.
#          W&B integration tests are separate (Deployment layer).
# ──────────────────────────────────────────────────────────────────
name: AUX 04 - Unit Test

on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  unit_test:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pandas scipy pytest-mock

      - name: Run pytest with coverage
        # Offline fixtures execute the online data-check assertions without W&B.
        run: pytest tests_offline/data_check --cov=src.data_check.test_data --cov-report=xml:coverage.xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: error
