# ──────────────────────────────────────────────────────────────────
# AUX Workflow: Smoke Test
# Tool:    python -c + compileall
# Checks:  all runtime dependencies importable,
#          no syntax errors in stable code paths
# Note:    No external services required (code-only check)
# ──────────────────────────────────────────────────────────────────
name: AUX 03 - Smoke Test

on:
  workflow_call:
    inputs:
      runner_os:
        description: "Runner OS"
        required: false
        type: string
        default: ubuntu-latest

jobs:
  smoke_test:
    runs-on: ${{ inputs.runner_os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hydra-core==1.3.2 matplotlib==3.10.7 pandas==2.3.2 jupyterlab==4.4.7 cookiecutter==2.6.0
          pip install mlflow==3.3.2 wandb==0.21.3

      - name: Check dependency imports
        run: python -c "import hydra; import matplotlib; import pandas; import mlflow; import wandb; import cookiecutter"

      - name: Check syntax (stable paths only)
        # train_random_forest/run.py excluded: contains unfilled placeholders
        run: python -m compileall main.py components src/data_check
