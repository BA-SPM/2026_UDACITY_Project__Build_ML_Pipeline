# ================================================================
# Middle-Layer Orchestrator: Deployment Readiness
# ================================================================
# Purpose:
# - Validate deployment readiness after CI/CT
#
# Architecture (OS-Aware):
# - SHARED LAYER (OS-independent): Deployment Test + Security → run once on ubuntu-latest
# - MATRIX LAYER (OS-dependent):   Docker Build + E2E        → run on all matrix runners
#
# Toggle inputs:
# - deployment_test_enabled  → external systems readiness (W&B/credentials)
# - security_enabled         → bandit security scan (code-only, thus OS-independent)
# - docker_enabled           → Docker build (OS-specific, requires matrix)
# - e2e_test_enabled         → end-to-end pipeline run (OS-specific, requires matrix)
#
# Note: Matrix is fully customizable via GitHub repository variable OS_MATRIX_JSON
# ================================================================
name: ORCHESTRATOR 03 - Deployment Readiness Layer

on:
  workflow_call:
    inputs:
      os_matrix:
        description: "OS matrix for matrix-based jobs (JSON array, e.g., [\"ubuntu-latest\", \"windows-latest\"])"
        required: false
        type: string
        default: "[\"ubuntu-latest\"]"
      deployment_test_enabled:
        description: "Enable deployment/external integration checks (requires W&B)"
        required: false
        type: boolean
        default: false
      e2e_test_enabled:
        description: "Enable full end-to-end pipeline run (requires W&B + all steps implemented)"
        required: false
        type: boolean
        default: false
      security_enabled:
        description: "Enable bandit security scan (OS-independent, runs once)"
        required: false
        type: boolean
        default: true
      docker_enabled:
        description: "Enable docker build (OS-specific, runs on matrix)"
        required: false
        type: boolean
        default: false

jobs:
  # ================================================================
  # SHARED LAYER: OS-independent checks (run once, no matrix)
  # ================================================================
  deployment_test:
    name: DR | Deployment Test (Shared)
    if: ${{ inputs.deployment_test_enabled && !failure() }}
    uses: ./.github/workflows/_AUX_06_deployment_test.yml
    with:
      runner_os: ubuntu-latest

  security:
    name: DR | Security Scan (Shared)
    if: ${{ inputs.security_enabled && !failure() }}
    uses: ./.github/workflows/_AUX_07_security.yml
    with:
      runner_os: ubuntu-latest

  # ================================================================
  # MATRIX LAYER: OS-dependent checks (run on all configured runners)
  # ================================================================
  docker:
    name: DR | Docker Build [${{ matrix.runner_os }}]
    if: ${{ inputs.docker_enabled && !failure() }}
    strategy:
      fail-fast: false
      matrix:
        runner_os: ${{ fromJSON(inputs.os_matrix) }}
    uses: ./.github/workflows/_AUX_08_docker.yml
    with:
      runner_os: ${{ matrix.runner_os }}

  e2e_test:
    name: DR | E2E Pipeline Test [${{ matrix.runner_os }}]
    needs: deployment_test
    if: ${{ always() && inputs.e2e_test_enabled && (!inputs.deployment_test_enabled || needs.deployment_test.result == 'success') && !failure() }}
    strategy:
      fail-fast: false
      matrix:
        runner_os: ${{ fromJSON(inputs.os_matrix) }}
    uses: ./.github/workflows/_AUX_09_e2e_test.yml
    with:
      runner_os: ${{ matrix.runner_os }}
